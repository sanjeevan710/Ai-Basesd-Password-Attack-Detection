{% extends "layout.html" %}
{% block content %}
<div class="auth-container">
  <div class="logo-area">
    <h1>Create Account</h1>
    <p style="color:#64748b;font-size:0.95rem;">Join the Secure Network</p>
  </div>

  <form action="{{ url_for('register') }}" method="POST">
    <!-- CSRF Token -->
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-group">
        <i class="fa-solid fa-user" style="position:absolute;left:16px;top:16px;color:#64748b;"></i>
        <input type="text" name="username" class="form-control"
               autocomplete="off" placeholder="Choose a username" style="padding-left:45px;" required/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-group">
        <i class="fa-solid fa-envelope" style="position:absolute;left:16px;top:16px;color:#64748b;"></i>
        <input type="email" name="email" class="form-control"
               autocomplete="off" placeholder="Enter your email" style="padding-left:45px;" required/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-group">
        <i class="fa-solid fa-lock" style="position:absolute;left:16px;top:16px;color:#64748b;"></i>
        <input type="password" name="password" class="form-control"
               placeholder="Create a strong password" style="padding-left:45px;" required/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-group">
        <i class="fa-solid fa-check" style="position:absolute;left:16px;top:16px;color:#64748b;"></i>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Confirm password" style="padding-left:45px;" required/>
      </div>
    </div>

    <button type="submit" class="btn-primary">Sign Up</button>

    <div class="form-footer" style="margin-top:1.5rem;text-align:center;font-size:0.9rem;color:#64748b;">
      <p>Already have an account?
        <a href="{{ url_for('login') }}" style="color:var(--secondary-color);text-decoration:none;">Login here</a>
      </p>
    </div>
  </form>
</div>
{% endblock %}
