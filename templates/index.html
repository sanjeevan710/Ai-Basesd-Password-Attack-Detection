{% extends "layout.html" %}
{% block content %}
<div class="auth-container">
  <div class="logo-area">
    <h1>Welcome Back</h1>
    <p style="color:#64748b; font-size:0.95rem;">Secure Login with AI Protection</p>
  </div>

  <form action="{{ url_for('login') }}" method="POST">
    <!-- CSRF Token -->
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-group">
        <i class="fa-solid fa-user" style="position:absolute;left:16px;top:16px;color:#64748b;"></i>
        <input type="text" name="username" class="form-control"
               autocomplete="off" placeholder="Enter username" style="padding-left:45px;" required/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-group">
        <i class="fa-solid fa-lock" style="position:absolute;left:16px;top:16px;color:#64748b;"></i>
        <input type="password" name="password" class="form-control"
               placeholder="Enter password" style="padding-left:45px;" required/>
      </div>
    </div>

    <button type="submit" class="btn-primary">
      <i class="fa-solid fa-shield-halved" style="margin-right:8px;"></i>Authenticate
    </button>

    <div class="form-footer" style="margin-top:1.5rem;text-align:center;font-size:0.9rem;color:#64748b;">
      <p>Don't have an account?
        <a href="{{ url_for('register') }}" style="color:var(--secondary-color);text-decoration:none;">Sign up here</a>
      </p>
    </div>
  </form>
</div>
{% endblock %}
